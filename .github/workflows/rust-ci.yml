name: Rust CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  rust-ci:
    name: Rust fmt + clippy + tests + CSV validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Run cargo fmt
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: rust
        run: cargo clippy --all --all-features --tests -- -D warnings

      - name: Run cargo tests
        working-directory: rust
        run: cargo test --all-features

      - name: Validate governance_particle.csv via csv-cli
        working-directory: rust
        run: |
          cargo run -p csv-cli -- \
            validate \
            --schema ../configs/governance-particle-schema.yaml \
            ../rust/examples/governance_particle.csv

      - name: Validate generic example CSVs via csv-cli
        working-directory: rust
        run: |
          cargo run -p csv-cli -- \
            validate \
            --schema ../configs/governance-particle-schema.yaml \
            ../examples/valid_example.csv
